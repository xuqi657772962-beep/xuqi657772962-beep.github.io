<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F6F2E9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>8 周减脂计划</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { 
  height: 100%; 
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  background: #F6F2E9;
  color: #1C1C19;
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
}
.serif { font-family: "Songti SC", "Source Han Serif SC", "STSong", Georgia, "Times New Roman", serif; }

:root {
  --paper: #F6F2E9;
  --card: #FFFFFF;
  --ink: #1C1C19;
  --ink-soft: #6B6862;
  --ink-fade: #9C9890;
  --line: #E8E2D4;
  --line-soft: #EFEBE0;
  --phase-a: #4A6B5C;
  --phase-a-bg: #E5EBE7;
  --phase-b: #BC6437;
  --phase-b-bg: #F2DDD0;
  --cheat: #C9A961;
  --cheat-bg: #F4EBD3;
  --shadow: 0 1px 3px rgba(28,28,25,0.04), 0 1px 1px rgba(28,28,25,0.03);
}

/* ===== App Shell ===== */
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
  position: relative;
}

/* ===== Header ===== */
.header {
  position: sticky;
  top: 0;
  background: var(--paper);
  z-index: 10;
  padding: env(safe-area-inset-top) 20px 0;
  border-bottom: 0.5px solid var(--line);
}
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0 6px;
}
.brand {
  font-size: 13px;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  text-transform: uppercase;
  font-weight: 500;
}
.settings-btn {
  background: none;
  border: none;
  font-size: 13px;
  color: var(--ink-soft);
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 6px;
}
.settings-btn:active { background: var(--line-soft); }

.day-spine {
  padding: 8px 0 16px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.day-number {
  font-family: "Songti SC", "Source Han Serif SC", Georgia, serif;
  font-size: 56px;
  font-weight: 400;
  line-height: 1;
  color: var(--ink);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.day-meta {
  text-align: right;
}
.day-total {
  font-size: 12px;
  color: var(--ink-fade);
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.day-progress {
  width: 60px;
  height: 3px;
  background: var(--line);
  border-radius: 2px;
  overflow: hidden;
  margin-left: auto;
}
.day-progress-fill {
  height: 100%;
  background: var(--phase-a);
  transition: width 0.4s ease, background 0.4s ease;
}
.phase-b .day-progress-fill { background: var(--phase-b); }

.day-info-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 14px;
  font-size: 14px;
}
.day-weekday {
  color: var(--ink);
  font-weight: 500;
}
.day-divider {
  width: 3px;
  height: 3px;
  background: var(--ink-fade);
  border-radius: 50%;
}
.day-theme {
  color: var(--ink-soft);
}
.phase-pill {
  margin-left: auto;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 99px;
  background: var(--phase-a-bg);
  color: var(--phase-a);
  font-weight: 500;
  letter-spacing: 0.04em;
}
.phase-b .phase-pill {
  background: var(--phase-b-bg);
  color: var(--phase-b);
}

/* ===== Day Navigation ===== */
.day-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background: var(--paper);
  border-bottom: 0.5px solid var(--line);
}
.day-nav-btn {
  background: none;
  border: none;
  font-size: 20px;
  color: var(--ink-soft);
  padding: 8px 14px;
  cursor: pointer;
  border-radius: 8px;
  font-family: inherit;
}
.day-nav-btn:active { background: var(--line-soft); }
.day-nav-btn:disabled { color: var(--ink-fade); }
.day-nav-today {
  font-size: 13px;
  color: var(--ink);
  padding: 6px 14px;
  border: 0.5px solid var(--line);
  border-radius: 99px;
  background: var(--card);
  cursor: pointer;
}

/* ===== Content ===== */
.content {
  padding: 20px;
}
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-title {
  font-size: 11px;
  color: var(--ink-fade);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 500;
  margin: 0 0 12px;
}

/* ===== Meal Card ===== */
.meal-card {
  background: var(--card);
  border-radius: 14px;
  border: 0.5px solid var(--line);
  margin-bottom: 12px;
  overflow: hidden;
  transition: transform 0.15s;
}
.meal-card:active { transform: scale(0.99); }
.meal-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
}
.meal-time-block {
  flex-shrink: 0;
  width: 52px;
  text-align: left;
}
.meal-time {
  font-family: "Songti SC", Georgia, serif;
  font-size: 18px;
  color: var(--ink);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.meal-slot {
  font-size: 10px;
  color: var(--ink-fade);
  letter-spacing: 0.06em;
  margin-top: 4px;
}
.meal-body {
  flex: 1;
  min-width: 0;
}
.meal-name {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.5;
  margin-bottom: 3px;
}
.meal-where {
  font-size: 11px;
  color: var(--ink-fade);
  letter-spacing: 0.05em;
}
.meal-where.bento { color: var(--phase-a); }
.phase-b .meal-where.bento { color: var(--phase-b); }
.meal-chevron {
  flex-shrink: 0;
  color: var(--ink-fade);
  font-size: 14px;
  transition: transform 0.2s;
}
.meal-card.open .meal-chevron { transform: rotate(180deg); }

.meal-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.meal-card.open .meal-detail { max-height: 2000px; }
.meal-detail-inner {
  padding: 0 16px 16px;
  border-top: 0.5px dashed var(--line);
  margin-top: 4px;
  padding-top: 14px;
}
.ingredient-list { margin-bottom: 14px; }
.ingredient {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 4px 0;
  color: var(--ink);
}
.ingredient-amount {
  color: var(--ink-soft);
  font-variant-numeric: tabular-nums;
}
.recipe-section {
  background: #FAF7F0;
  border-radius: 10px;
  padding: 12px 14px;
  margin-top: 10px;
}
.recipe-label {
  font-size: 10px;
  color: var(--ink-fade);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 500;
}
.recipe-step {
  display: flex;
  gap: 10px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink);
}
.recipe-step:last-child { margin-bottom: 0; }
.step-num {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--phase-a);
  color: white;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 500;
  margin-top: 2px;
}
.phase-b .step-num { background: var(--phase-b); }
.recipe-tip {
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.6;
  padding-top: 10px;
  margin-top: 8px;
  border-top: 0.5px dashed var(--line);
}
.recipe-tip strong { color: var(--ink); font-weight: 500; }
.recipe-time {
  display: inline-block;
  font-size: 11px;
  color: var(--ink-soft);
  padding: 2px 8px;
  background: var(--paper);
  border-radius: 4px;
  margin-left: 8px;
}

/* ===== Summary Card ===== */
.summary-card {
  background: var(--card);
  border-radius: 14px;
  padding: 18px;
  border: 0.5px solid var(--line);
  margin-bottom: 18px;
}
.summary-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}
.summary-item {
  text-align: center;
  padding: 4px 0;
  border-right: 0.5px solid var(--line);
}
.summary-item:last-child { border-right: none; }
.summary-val {
  font-family: "Songti SC", Georgia, serif;
  font-size: 24px;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.summary-label {
  font-size: 10px;
  color: var(--ink-fade);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 4px;
}
.summary-note {
  font-size: 12px;
  color: var(--ink-soft);
  padding: 12px 0 0;
  margin-top: 12px;
  border-top: 0.5px solid var(--line-soft);
  line-height: 1.6;
}

/* ===== Cheat Day Banner ===== */
.cheat-banner {
  background: var(--cheat-bg);
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 18px;
  border: 0.5px solid #E4D5A8;
}
.cheat-banner-title {
  font-size: 13px;
  color: #8A6F2E;
  letter-spacing: 0.04em;
  font-weight: 500;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cheat-banner-text {
  font-size: 13px;
  color: #735923;
  line-height: 1.65;
}

/* ===== Shopping Tab ===== */
.shopping-intro {
  font-size: 13px;
  color: var(--ink-soft);
  padding: 0 0 16px;
  line-height: 1.65;
}
.shop-category {
  margin-bottom: 18px;
}
.shop-cat-title {
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}
.shop-cat-count {
  color: var(--ink-fade);
}
.shop-item {
  background: var(--card);
  border-radius: 10px;
  border: 0.5px solid var(--line);
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.15s;
}
.shop-item:active { background: var(--paper); }
.shop-item-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.shop-check {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  flex-shrink: 0;
  transition: all 0.15s;
}
.shop-item.checked .shop-check {
  background: var(--phase-a);
  border-color: var(--phase-a);
  position: relative;
}
.phase-b .shop-item.checked .shop-check {
  background: var(--phase-b);
  border-color: var(--phase-b);
}
.shop-item.checked .shop-check::after {
  content: "✓";
  color: white;
  font-size: 12px;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}
.shop-item.checked .shop-name { 
  text-decoration: line-through; 
  color: var(--ink-fade); 
}
.shop-name {
  flex: 1;
  font-size: 14px;
  color: var(--ink);
}
.shop-amount {
  font-size: 12px;
  color: var(--ink-soft);
  font-variant-numeric: tabular-nums;
}
.shop-subs {
  font-size: 11px;
  color: var(--ink-fade);
  padding: 8px 0 0 32px;
  line-height: 1.6;
}
.shop-subs-label {
  color: var(--ink-soft);
  font-weight: 500;
}

/* ===== Recipes Tab ===== */
.recipe-grid {
  display: grid;
  gap: 10px;
}
.recipe-card {
  background: var(--card);
  border: 0.5px solid var(--line);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
}
.recipe-card:active { background: var(--paper); }
.recipe-card-title {
  font-size: 14px;
  color: var(--ink);
  margin-bottom: 4px;
}
.recipe-card-meta {
  font-size: 11px;
  color: var(--ink-fade);
  letter-spacing: 0.04em;
}

.recipe-cat-title {
  font-family: "Songti SC", Georgia, serif;
  font-size: 17px;
  color: var(--ink);
  margin: 20px 0 12px;
  padding-bottom: 8px;
  border-bottom: 0.5px solid var(--line);
}
.recipe-cat-title:first-child { margin-top: 0; }

/* ===== Progress Tab ===== */
.progress-hero {
  background: var(--card);
  border: 0.5px solid var(--line);
  border-radius: 16px;
  padding: 22px;
  text-align: center;
  margin-bottom: 16px;
}
.progress-hero-num {
  font-family: "Songti SC", Georgia, serif;
  font-size: 64px;
  line-height: 1;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.progress-hero-sub {
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 6px;
  letter-spacing: 0.05em;
}
.progress-bar-wrap {
  margin-top: 16px;
  background: var(--line);
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--phase-a);
  transition: width 0.4s ease, background 0.4s ease;
}
.phase-b .progress-bar-fill { background: var(--phase-b); }

.day-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-top: 16px;
}
.day-dot {
  aspect-ratio: 1;
  border-radius: 6px;
  background: var(--line-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--ink-fade);
  font-variant-numeric: tabular-nums;
  cursor: pointer;
  transition: all 0.15s;
  font-family: "Songti SC", Georgia, serif;
}
.day-dot.done {
  background: var(--phase-a);
  color: white;
}
.day-dot.done.phase-b-day {
  background: var(--phase-b);
}
.day-dot.current {
  background: var(--card);
  border: 1.5px solid var(--ink);
  color: var(--ink);
}
.day-dot.future { opacity: 0.4; }

/* ===== Tab Bar ===== */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: rgba(246,242,233,0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--line);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index: 100;
}
.tab-btn {
  flex: 1;
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 4px;
  color: var(--ink-fade);
  cursor: pointer;
  font-family: inherit;
  transition: color 0.15s;
}
.tab-btn.active { color: var(--ink); }
.tab-btn-icon {
  font-family: "Songti SC", Georgia, serif;
  font-size: 18px;
  line-height: 1;
}
.tab-btn-label {
  font-size: 10px;
  letter-spacing: 0.06em;
}

/* ===== Modal ===== */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(28,28,25,0.4);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-backdrop.open {
  opacity: 1;
  pointer-events: auto;
}
.modal {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translate(-50%, 100%);
  width: 100%;
  max-width: 480px;
  background: var(--paper);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  z-index: 201;
  transition: transform 0.3s ease;
  max-height: 80vh;
  overflow-y: auto;
}
.modal.open { transform: translate(-50%, 0); }
.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--ink-fade);
  border-radius: 2px;
  margin: 0 auto 18px;
  opacity: 0.5;
}
.modal-title {
  font-family: "Songti SC", Georgia, serif;
  font-size: 22px;
  margin-bottom: 16px;
  color: var(--ink);
}
.modal-row {
  padding: 14px 0;
  border-bottom: 0.5px solid var(--line);
}
.modal-row:last-child { border-bottom: none; }
.modal-label {
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.modal-input {
  width: 100%;
  font-size: 16px;
  padding: 10px 14px;
  border: 0.5px solid var(--line);
  border-radius: 10px;
  background: var(--card);
  color: var(--ink);
  font-family: inherit;
}
.modal-input:focus {
  outline: none;
  border-color: var(--phase-a);
}
.modal-btn {
  width: 100%;
  padding: 14px;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-family: inherit;
  margin-top: 16px;
  cursor: pointer;
}
.modal-btn:active { opacity: 0.8; }

/* ===== Empty States ===== */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-fade);
}
.empty-icon {
  font-family: "Songti SC", Georgia, serif;
  font-size: 48px;
  opacity: 0.4;
  margin-bottom: 12px;
}
.empty-text {
  font-size: 13px;
}
</style>
</head>
<body>

<div class="app" id="app">
  
  <header class="header">
    <div class="header-row">
      <div class="brand">8 周减脂</div>
      <button class="settings-btn" onclick="openSettings()">设置</button>
    </div>
    <div class="day-spine">
      <div class="day-number serif" id="dayNumber">01</div>
      <div class="day-meta">
        <div class="day-total" id="dayTotal">共 56 天 · 1.8%</div>
        <div class="day-progress"><div class="day-progress-fill" id="progressFill" style="width: 1.8%"></div></div>
      </div>
    </div>
    <div class="day-info-row">
      <span class="day-weekday" id="dayWeekday">周一</span>
      <span class="day-divider"></span>
      <span class="day-theme" id="dayTheme">牛肉日</span>
      <span class="phase-pill" id="phasePill">阶段 A · 保肌期</span>
    </div>
  </header>

  <nav class="day-nav">
    <button class="day-nav-btn" onclick="changeDay(-1)">←</button>
    <button class="day-nav-today" onclick="goToCurrentDay()">今天</button>
    <button class="day-nav-btn" onclick="changeDay(1)">→</button>
  </nav>

  <main class="content">

    <!-- TODAY TAB -->
    <section id="tab-today" class="tab-content active">
      <div id="cheatBanner" style="display:none;"></div>
      <div class="summary-card">
        <div class="summary-grid">
          <div class="summary-item">
            <div class="summary-val" id="sumKcal">2100</div>
            <div class="summary-label">千卡</div>
          </div>
          <div class="summary-item">
            <div class="summary-val" id="sumProtein">185</div>
            <div class="summary-label">蛋白(g)</div>
          </div>
          <div class="summary-item">
            <div class="summary-val">3L</div>
            <div class="summary-label">水</div>
          </div>
        </div>
        <div class="summary-note" id="summaryNote"></div>
      </div>
      <div class="section-title">今日饮食</div>
      <div id="mealList"></div>
    </section>

    <!-- SHOPPING TAB -->
    <section id="tab-shopping" class="tab-content">
      <div class="shopping-intro" id="shoppingIntro"></div>
      <div id="shoppingList"></div>
    </section>

    <!-- RECIPES TAB -->
    <section id="tab-recipes" class="tab-content">
      <div id="recipeList"></div>
    </section>

    <!-- PROGRESS TAB -->
    <section id="tab-progress" class="tab-content">
      <div class="progress-hero">
        <div class="progress-hero-num" id="progNum">01</div>
        <div class="progress-hero-sub" id="progSub">/ 共 56 天</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progFill" style="width: 1.8%"></div>
        </div>
      </div>
      <div class="section-title">阶段 A · 保肌期（1–28 天）</div>
      <div class="day-grid" id="phaseAGrid"></div>

function getPhase(day) { return day <= 28 ? 'A' : 'B'; }
function getWeekdayIndex(day) { return (day - 1) % 7; }
function getDayData(day) {
  const idx = getWeekdayIndex(day);
  return WEEK_PLAN[idx];
}
function getWeekNumber(day) { return Math.ceil(day / 7); }

// ============ RENDER: TODAY ============
function renderToday() {
  const day = currentDay;
  const phase = getPhase(day);
  const data = getDayData(day);
  const app = document.getElementById('app');
  
  // Update phase class on app
  app.classList.toggle('phase-b', phase === 'B');
  
  // Day number
  const dnEl = document.getElementById('dayNumber');
  dnEl.textContent = String(day).padStart(2, '0');
  
  // Progress
  const pct = (day / 56 * 100).toFixed(1);
  document.getElementById('dayTotal').textContent = `共 56 天 · ${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
  
  // Day info
  document.getElementById('dayWeekday').textContent = data.weekday;
  document.getElementById('dayTheme').textContent = data.theme;
  document.getElementById('phasePill').textContent = phase === 'A' ? '阶段 A · 保肌期' : '阶段 B · 速度期';
  
  // Summary
  document.getElementById('sumKcal').textContent = data.kcal[phase];
  document.getElementById('sumProtein').textContent = data.protein[phase];
  document.getElementById('summaryNote').textContent = 
    phase === 'A' 
      ? '保肌优先期：热量小幅赤字，蛋白质拉满，保住所有训练成果。' 
      : '速度优先期：加大赤字，提升有氧量，腹肌轮廓开始显现。';
  
  // Cheat banner
  const cheatBanner = document.getElementById('cheatBanner');
  if (data.cheatDay && phase === 'A') {
    cheatBanner.style.display = 'block';
    cheatBanner.innerHTML = `
      <div class="cheat-banner">
        <div class="cheat-banner-title">◆ 今日是放纵餐日</div>
        <div class="cheat-banner-text">19:30 晚餐可以替换为作弊餐（烤肉、火锅、寿司或自选）。最多比平日多 600–800 kcal。次日不要称重，多喝水。</div>
      </div>
    `;
  } else if (data.cheatDay && phase === 'B') {
    cheatBanner.style.display = 'block';
    cheatBanner.innerHTML = `
      <div class="cheat-banner">
        <div class="cheat-banner-title">◇ 今日是补碳日</div>
        <div class="cheat-banner-text">15:30 主餐改为高碳水补碳餐：白米饭/面条吃到 2 倍量，肉量正常，几乎不吃油（如清汤面 + 白灼肉）。目的是恢复糖原 + 微升瘦素。</div>
      </div>
    `;
  } else {
    cheatBanner.style.display = 'none';
  }
  
  // Meal list
  const mealList = document.getElementById('mealList');
  mealList.innerHTML = data.meals.map((meal, idx) => {
    const recipe = RECIPES[meal.recipeId] || { name: '', steps: [], tip: '', time: '' };
    const items = meal.items.map(item => {
      const amount = phase === 'B' && item.phaseB ? item.phaseB : item.a;
      if (amount === '取消') return '';
      return `<div class="ingredient"><span>${item.n}</span><span class="ingredient-amount">${amount}</span></div>`;
    }).join('');
    const stepsHtml = recipe.steps.map((s, i) => 
      `<div class="recipe-step"><span class="step-num">${i+1}</span><span>${s}</span></div>`
    ).join('');
    
    return `
      <div class="meal-card" data-idx="${idx}">
        <div class="meal-header" onclick="toggleMeal(${idx})">
          <div class="meal-time-block">
            <div class="meal-time serif">${meal.time}</div>
            <div class="meal-slot">${meal.slot}</div>
          </div>
          <div class="meal-body">
            <div class="meal-name">${recipe.name || meal.slot}</div>
            <div class="meal-where ${meal.where === '便当' ? 'bento' : ''}">${meal.where}</div>
          </div>
          <div class="meal-chevron">⌄</div>
        </div>
        <div class="meal-detail">
          <div class="meal-detail-inner">
            <div class="ingredient-list">${items}</div>
            ${stepsHtml ? `
              <div class="recipe-section">
                <div class="recipe-label">做法 <span class="recipe-time">${recipe.time}</span></div>
                ${stepsHtml}
                ${recipe.tip ? `<div class="recipe-tip">${recipe.tip}</div>` : ''}
              </div>
            ` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleMeal(idx) {
  const card = document.querySelector(`.meal-card[data-idx="${idx}"]`);
  card.classList.toggle('open');
}

// ============ RENDER: SHOPPING ============
function renderShopping() {
  const today = currentDay;
  const tomorrow = today >= 56 ? 56 : today + 1;
  const data = getDayData(tomorrow);
  const phase = getPhase(tomorrow);
  
  const intro = document.getElementById('shoppingIntro');
  intro.innerHTML = `<strong style="color:var(--ink)">为第 ${tomorrow} 天准备</strong> · ${data.weekday} · ${data.theme}<br>新鲜食材建议当晚或当天早上购买。馒头、紫薯等可一周买一次冷冻保存。`;
  
  // Collect all unique ingredients from tomorrow's meals
  const allItems = {};
  data.meals.forEach(meal => {
    meal.items.forEach(item => {
      const amount = phase === 'B' && item.phaseB ? item.phaseB : item.a;
      if (amount === '取消') return;
      if (!allItems[item.n]) allItems[item.n] = amount;
    });
  });
  
  // Categorize
  const categories = {
    "肉蛋海鲜": [],
    "蔬菜水果": [],
    "主食杂粮": [],
    "调味与其他": []
  };
  
  const meatList = ['牛肉', '鸡腿肉（去皮）', '鸡胸肉', '鸭胸（去皮）', '猪里脊', '鲈鱼', '三文鱼（或鲈鱼）', '虾仁', '牛里脊/菲力', '鸡胸薄片（前晚备）', '鸡胸薄片', '老豆腐', '鸡蛋', '水煮蛋'];
  const carbList = ['燕麦', '全麦面包', '玉米面馒头', '荞面馒头', '黑麦馒头', '紫薯馒头', '红薯馒头', '荞麦馒头', '燕麦馒头', '五谷馒头', '杂粮馒头', '紫薯（蒸熟）', '南瓜（蒸）', '香蕉', '玉米馒头'];
  const dairyList = ['全脂牛奶', '希腊酸奶', 'ON 蛋白粉', '黑咖啡', '杏仁'];
  
  Object.entries(allItems).forEach(([name, amount]) => {
    if (meatList.some(m => name.includes(m) || m.includes(name))) categories["肉蛋海鲜"].push({ name, amount });
    else if (carbList.some(c => name.includes(c) || c.includes(name))) categories["主食杂粮"].push({ name, amount });
    else if (dairyList.some(d => name.includes(d) || d.includes(name))) categories["调味与其他"].push({ name, amount });
    else categories["蔬菜水果"].push({ name, amount });
  });
  
  const html = Object.entries(categories).map(([catName, items]) => {
    if (items.length === 0) return '';
    const itemsHtml = items.map((item, i) => {
      const checkId = `shop_${tomorrow}_${catName}_${i}`;
      const checked = shoppingChecked[checkId] ? 'checked' : '';
      const subs = SUBS[item.name] || [];
      const subsHtml = subs.length > 0 
        ? `<div class="shop-subs"><span class="shop-subs-label">替换</span> · ${subs.join(' / ')}</div>`
        : '';
      return `
        <div class="shop-item ${checked}" onclick="toggleShop('${checkId}', this)">
          <div class="shop-item-row">
            <div class="shop-check"></div>
            <div class="shop-name">${item.name}</div>
            <div class="shop-amount">${item.amount}</div>
          </div>
          ${subsHtml}
        </div>
      `;
    }).join('');
    return `
      <div class="shop-category">
        <div class="shop-cat-title">
          <span>${catName}</span>
          <span class="shop-cat-count">${items.length} 项</span>
        </div>
        ${itemsHtml}
      </div>
    `;
  }).join('');
  
  document.getElementById('shoppingList').innerHTML = html || '<div class="empty"><div class="empty-icon">空</div><div class="empty-text">无需采购</div></div>';
}

function toggleShop(id, el) {
  el.classList.toggle('checked');
  shoppingChecked[id] = el.classList.contains('checked');
  localStorage.setItem('fl_shopping', JSON.stringify(shoppingChecked));
}

// ============ RENDER: RECIPES ============
function renderRecipes() {
  const categories = {
    "早餐": [], "训后": [], "加餐": [], "主餐": [], "晚餐": []
  };
  Object.entries(RECIPES).forEach(([id, r]) => {
    if (categories[r.category]) categories[r.category].push({ id, ...r });
  });
  const html = Object.entries(categories).map(([cat, recipes]) => {
    if (recipes.length === 0) return '';
    return `
      <h2 class="recipe-cat-title serif">${cat}</h2>
      <div class="recipe-grid">
        ${recipes.map(r => `
          <div class="recipe-card" onclick="openRecipe('${r.id}')">
            <div class="recipe-card-title">${r.name}</div>
            <div class="recipe-card-meta">${r.time}</div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
  document.getElementById('recipeList').innerHTML = html;
}

function openRecipe(id) {
  const r = RECIPES[id];
  if (!r) return;
  const stepsHtml = r.steps.map((s, i) => 
    `<div class="recipe-step"><span class="step-num">${i+1}</span><span>${s}</span></div>`
  ).join('');
  const html = `
    <div class="modal-handle"></div>
    <div class="modal-title serif">${r.name}</div>
    <div style="font-size:12px;color:var(--ink-fade);letter-spacing:0.06em;margin-bottom:14px;">
      ${r.category} · ${r.time}
    </div>
    <div class="recipe-section" style="background:var(--card);">
      <div class="recipe-label">做法</div>
      ${stepsHtml}
      ${r.tip ? `<div class="recipe-tip">${r.tip}</div>` : ''}
    </div>
    <button class="modal-btn" onclick="closeSettings()">完成</button>
  `;
  const modal = document.getElementById('settingsModal');
  modal.innerHTML = html;
  modal.classList.add('open');
  document.getElementById('settingsBackdrop').classList.add('open');
}

// ============ RENDER: PROGRESS ============
function renderProgress() {
  const phase = getPhase(currentDay);
  document.getElementById('progNum').textContent = String(currentDay).padStart(2, '0');
  const pct = (currentDay / 56 * 100).toFixed(1);
  document.getElementById('progSub').textContent = `/ 共 56 天 · ${pct}%`;
  document.getElementById('progFill').style.width = pct + '%';
  
  // Day grids
  const renderGrid = (start, end, containerId) => {
    let html = '';
    for (let d = start; d <= end; d++) {
      let cls = 'day-dot';
      if (completedDays.includes(d)) {
        cls += ' done';
        if (d > 28) cls += ' phase-b-day';
      } else if (d === currentDay) cls += ' current';
      else if (d > currentDay) cls += ' future';
      html += `<div class="${cls}" onclick="toggleDayDone(${d})">${d}</div>`;
    }
    document.getElementById(containerId).innerHTML = html;
  };
  renderGrid(1, 28, 'phaseAGrid');
  renderGrid(29, 56, 'phaseBGrid');
  
  // Records
  const recordHtml = weekRecords.length === 0 
    ? '<div style="font-size:12px;color:var(--ink-fade);text-align:center;padding:20px 0;">尚无记录</div>'
    : weekRecords.map((r, i) => `
        <div style="padding:10px 0;border-top:0.5px solid var(--line);display:flex;justify-content:space-between;align-items:baseline;font-size:13px;">
          <span style="color:var(--ink-soft);">第 ${r.week} 周</span>
          <span style="color:var(--ink);font-weight:500;">${r.weight} kg</span>
          ${r.note ? `<span style="color:var(--ink-fade);font-size:11px;flex-basis:100%;margin-top:4px;">${r.note}</span>` : ''}
        </div>
      `).join('');
  document.getElementById('recordList').innerHTML = recordHtml;
}

function toggleDayDone(d) {
  const idx = completedDays.indexOf(d);
  if (idx >= 0) completedDays.splice(idx, 1);
  else completedDays.push(d);
  localStorage.setItem('fl_completed', JSON.stringify(completedDays));
  renderProgress();
}

function saveWeekRecord() {
  const w = parseFloat(document.getElementById('weekWeight').value);
  const note = document.getElementById('weekNote').value;
  if (isNaN(w)) { alert('请输入体重'); return; }
  const week = getWeekNumber(currentDay);
  weekRecords = weekRecords.filter(r => r.week !== week);
  weekRecords.push({ week, weight: w, note, date: new Date().toLocaleDateString('zh-CN') });
  weekRecords.sort((a, b) => a.week - b.week);
  localStorage.setItem('fl_records', JSON.stringify(weekRecords));
  document.getElementById('weekWeight').value = '';
  document.getElementById('weekNote').value = '';
  renderProgress();
}

// ============ NAVIGATION ============
function changeDay(delta) {
  const next = currentDay + delta;
  if (next < 1 || next > 56) return;
  currentDay = next;
  localStorage.setItem('fl_currentDay', currentDay);
  renderAll();
}

function goToCurrentDay() {
  const startDate = localStorage.getItem('fl_startDate');
  if (!startDate) {
    alert('请在设置中先选择开始日期');
    openSettings();
    return;
  }
  const start = new Date(startDate);
  const today = new Date();
  const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24)) + 1;
  currentDay = Math.max(1, Math.min(56, diff));
  localStorage.setItem('fl_currentDay', currentDay);
  renderAll();
}

function switchTab(tabName, btnEl) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tabName).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  
  if (tabName === 'shopping') renderShopping();
  if (tabName === 'recipes') renderRecipes();
  if (tabName === 'progress') renderProgress();
}

function openSettings() {
  // Reset modal content if it was a recipe
  const modal = document.getElementById('settingsModal');
  modal.innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-title serif">设置</div>
    <div class="modal-row">
      <div class="modal-label">今天是第几天 (1-56)</div>
      <input type="number" class="modal-input" id="dayInput" min="1" max="56" value="${currentDay}">
    </div>
    <div class="modal-row">
      <div class="modal-label">或者：选择开始日期，自动计算</div>
      <input type="date" class="modal-input" id="dateInput" value="${localStorage.getItem('fl_startDate') || ''}">
    </div>
    <button class="modal-btn" onclick="saveSettings()">保存</button>
  `;
  modal.classList.add('open');
  document.getElementById('settingsBackdrop').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
  document.getElementById('settingsBackdrop').classList.remove('open');
}

function saveSettings() {
  const dayInput = document.getElementById('dayInput');
  const dateInput = document.getElementById('dateInput');
  if (dateInput && dateInput.value) {
    localStorage.setItem('fl_startDate', dateInput.value);
    const start = new Date(dateInput.value);
    const today = new Date();
    const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24)) + 1;
    currentDay = Math.max(1, Math.min(56, diff));
  } else if (dayInput && dayInput.value) {
    currentDay = Math.max(1, Math.min(56, parseInt(dayInput.value)));
  }
  localStorage.setItem('fl_currentDay', currentDay);
  closeSettings();
  renderAll();
}

// ============ AUTO DATE SYNC ============
function syncToToday() {
  const startDate = localStorage.getItem('fl_startDate');
  if (!startDate) return false;
  const start = new Date(startDate + 'T00:00:00');
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24)) + 1;
  const clamped = Math.max(1, Math.min(56, diff));
  if (clamped !== currentDay) {
    currentDay = clamped;
    localStorage.setItem('fl_currentDay', String(currentDay));
  }
  return true;
}

// Check for date change while page is open (tab switch / screen wake)
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    const before = currentDay;
    syncToToday();
    if (currentDay !== before) renderAll();
  }
});

// Also re-sync every 60 seconds in case user leaves it open overnight
setInterval(function() {
  const before = currentDay;
  syncToToday();
  if (currentDay !== before) renderAll();
}, 60000);

// ============ INIT ============
function renderAll() {
  renderToday();
  const activeTab = document.querySelector('.tab-content.active').id.replace('tab-', '');
  if (activeTab === 'shopping') renderShopping();
  if (activeTab === 'progress') renderProgress();
}

// On first load: sync to today's date automatically
syncToToday();
renderAll();
renderRecipes();

</script>
